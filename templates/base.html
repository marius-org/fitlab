<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitLab — {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c10;
      --surface:   #13151c;
      --card:      #1a1d27;
      --border:    #2a2d3e;
      --orange:    #ff6b35;
      --yellow:    #f7c948;
      --green:     #39d98a;
      --blue:      #4fc3f7;
      --purple:    #a78bfa;
      --text:      #f0f0f5;
      --muted:     #8888a8;
      --radius:    14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.4rem;
      font-weight: 900;
      text-decoration: none;
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .nav-links { display: flex; gap: 0.5rem; }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
      background: var(--card);
    }

    .nav-links a.active {
      color: var(--orange);
    }

    /* ── LAYOUT ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .page-header .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .page-header h1 {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 0.6rem;
      letter-spacing: -1px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    /* ── FORM ELEMENTS ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 1.8rem; }
    }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
      transition: border-color 0.2s;
      width: 100%;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--orange);
    }

    select option { background: var(--card); }

    /* ── BUTTON ── */
    .btn {
      display: inline-block;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 2rem;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
      text-align: center;
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      color: #0b0c10;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #0b0c10;
    }

    /* ── STAT CARDS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1rem;
      margin-top: 2rem;
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
    }

    .stat-card .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }

    .stat-card .stat-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── MACRO BAR ── */
    .macro-bar {
      display: flex;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin: 1rem 0 0.5rem;
      gap: 3px;
    }

    .macro-bar span {
      display: block;
      border-radius: 999px;
      transition: width 0.4s;
    }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── RESULT SECTION ── */
    .result-section {
      margin-top: 2.5rem;
    }

    .result-section h2 {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ── EXERCISE TABLE ── */
    .exercise-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }

    .exercise-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.25rem 1rem;
      align-items: start;
    }

    .exercise-card .ex-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .exercise-card .ex-tip {
      font-size: 0.8rem;
      color: var(--muted);
      grid-column: 1;
    }

    .exercise-card .ex-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: flex-end;
      grid-row: 1 / 3;
      grid-column: 2;
      align-self: center;
    }

    .badge-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">⚡ FitLab</a>
  <div class="nav-links">
    <a href="/" class="{% block nav_calc %}{% endblock %}">Calculator</a>
    <a href="/workout" class="{% block nav_workout %}{% endblock %}">Workout Generator</a>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  FitLab &mdash; Built with FastAPI &amp; 💪
</footer>

</body>
</html>
