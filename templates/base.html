<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FITLAB — {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:    #000000;
      --bg:       #0a0a0a;
      --surface:  #111111;
      --card:     #161616;
      --border:   #222222;
      --border-2: #333333;
      --neon:     #c8ff00;
      --neon-dim: rgba(200,255,0,0.08);
      --neon-dim2:rgba(200,255,0,0.15);
      --white:    #ffffff;
      --grey:     #888888;
      --grey-2:   #555555;
      --red:      #ff3b30;
      --radius:   4px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    nav { position: sticky; top: 0; z-index: 100; background: var(--black); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; }
    .nav-brand { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 3px; text-decoration: none; color: var(--white); display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand .dot { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; }
    .nav-links { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .nav-links a { text-decoration: none; color: var(--grey); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 0.55rem 1.25rem; transition: all 0.15s; border-right: 1px solid var(--border); }
    .nav-links a:last-child { border-right: none; }
    .nav-links a:hover { color: var(--white); background: var(--surface); }
    .nav-links a.active { color: var(--black); background: var(--neon); }
    main { max-width: 900px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }
    .page-header { margin-bottom: 3.5rem; }
    .page-tag { display: inline-block; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--neon); margin-bottom: 1rem; }
    .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 10vw, 6rem); letter-spacing: 4px; line-height: 0.95; color: var(--white); margin-bottom: 1rem; }
    .page-header h1 .highlight { color: var(--neon); }
    .page-header p { color: var(--grey); font-size: 0.95rem; font-weight: 500; line-height: 1.6; max-width: 480px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:580px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--grey); }
    input, select { background: var(--black); border: 1px solid var(--border-2); border-radius: var(--radius); color: var(--white); font-family: 'Barlow', sans-serif; font-size: 1rem; font-weight: 600; padding: 0.85rem 1rem; transition: border-color 0.15s; width: 100%; -webkit-appearance: none; }
    input::placeholder { color: var(--grey-2); font-weight: 400; }
    input:focus, select:focus { outline: none; border-color: var(--neon); }
    select option { background: var(--card); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; border: none; border-radius: var(--radius); cursor: pointer; font-family: 'Barlow', sans-serif; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; padding: 1rem 2rem; transition: all 0.15s; text-decoration: none; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--neon); color: var(--black); width: 100%; margin-top: 1rem; }
    .btn-primary:hover { background: #d4ff1a; }
    .btn-secondary { background: transparent; border: 1px solid var(--border-2); color: var(--white); }
    .btn-secondary:hover { border-color: var(--neon); color: var(--neon); }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 2rem; }
    .stat-card { background: var(--card); padding: 1.5rem 1.25rem; position: relative; }
    .stat-card.highlighted { background: var(--surface); }
    .stat-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--grey); margin-bottom: 0.75rem; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 2px; line-height: 1; }
    .stat-sub { font-size: 0.72rem; color: var(--grey); margin-top: 0.35rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .macro-bar { display: flex; height: 4px; gap: 2px; margin: 1rem 0 0.75rem; }
    .macro-bar span { display: block; }
    .result-section { margin-top: 3rem; }
    .section-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--grey); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .exercise-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .exercise-card { background: var(--card); padding: 1.1rem 1.5rem; display: grid; grid-template-columns: 3rem 1fr auto; grid-template-rows: auto auto; gap: 0.2rem 1rem; align-items: center; transition: background 0.15s; }
    .exercise-card:hover { background: var(--surface); }
    .ex-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--border-2); letter-spacing: 1px; grid-row: 1 / 3; line-height: 1; }
    .ex-name { font-weight: 700; font-size: 0.95rem; color: var(--white); grid-row: 1; grid-column: 2; }
    .ex-tip { font-size: 0.75rem; color: var(--grey); grid-row: 2; grid-column: 2; font-weight: 400; }
    .ex-badges { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: flex-end; grid-row: 1 / 3; grid-column: 3; align-self: center; }
    .pill { font-size: 0.62rem; font-weight: 800; padding: 0.3rem 0.65rem; border-radius: 2px; white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
    .info-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--neon); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .info-box-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); margin-bottom: 0.6rem; }
    .info-box p { font-size: 0.85rem; color: var(--grey); line-height: 1.75; font-weight: 500; }
    footer { text-align: center; padding: 2rem; color: var(--grey-2); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">FITLAB<span class="dot"></span></a>
  <div class="nav-links">
    <a href="/" class="{% block nav_calc %}{% endblock %}">Calculator</a>
    <a href="/workout" class="{% block nav_workout %}{% endblock %}">Workout</a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<footer>FITLAB &mdash; Built with FastAPI</footer>
</body>
</html>
